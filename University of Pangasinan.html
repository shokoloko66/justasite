        <script>
            $(document).ready(function () {
                // Toggle the enlarged image and overlay when clicked
                $(".NPC-Logo").click(function () {
                    $(this).toggleClass("enlarged");  // Enlarge or shrink the image
                    $("#overlay").toggleClass("active");  // Toggle the overlay visibility
                });

                // Close the enlarged image when clicking on the overlay
                $("#overlay").click(function () {
                    $(".NPC-Logo").removeClass("enlarged");  // Shrink the image back to its original size
                    $(this).removeClass("active");  // Hide the overlay
                });
            });
        </script>
        
        <script type="text/javascript">
            $(document).ready(function () {
                //to set sessionCount 0 on logout
                localStorage.setItem('sessionCount', '0');
                var Validate = "";
                $("#txtPassword").bind("keyup", function () {

                    //TextBox left blank.
                    if ($(this).val().length == 0) {
                        $("#password_strength").html("");
                        return;
                    }

                    //Regular Expressions.
                    var regex = new Array();
                    regex.push("[A-Z]"); //Uppercase Alphabet.
                    regex.push("[a-z]"); //Lowercase Alphabet.
                    regex.push("[0-9]"); //Digit.
                    regex.push("[$@$!%*#?&]"); //Special Character.

                    var passed = 0;

                    //Validate for each Regular Expression.
                    for (var i = 0; i < regex.length; i++) {
                        if (new RegExp(regex[i]).test($(this).val())) {
                            passed++;
                        }
                    }


                    //Validate for length of Password.
                    if (passed > 2 && $(this).val().length > 8) {
                        passed++;
                    }

                    //Display status.
                    var color = "";
                    var strength = "";
                    switch (passed) {
                        case 0:
                        case 1:
                            strength = "Weak";
                            color = "red";
                            break;
                        case 2:
                            strength = "Good";
                            color = "darkorange";
                            break;
                        case 3:
                        case 4:
                            strength = "Strong";
                            color = "green";
                            break;
                        case 5:
                            strength = "Very Strong";
                            color = "darkgreen";
                            break;
                    }

        <script type="text/javascript">
            var Validate = "";
            var parameter = Sys.WebForms.PageRequestManager.getInstance();
            parameter.add_endRequest(function () {
                $(document).ready(function () {
                    localStorage.setItem('sessionCount', '0');
                    $("#txtPassword").bind("keyup", function () {

                        //TextBox left blank.
                        if ($(this).val().length == 0) {
                            $("#password_strength").html("");
                            return;
                        }

                        //Regular Expressions.
                        var regex = new Array();
                        regex.push("[A-Z]"); //Uppercase Alphabet.
                        regex.push("[a-z]"); //Lowercase Alphabet.
                        regex.push("[0-9]"); //Digit.
                        regex.push("[$@$!%*#?&]"); //Special Character.

                        var passed = 0;

                        //Validate for each Regular Expression.
                        for (var i = 0; i < regex.length; i++) {
                            if (new RegExp(regex[i]).test($(this).val())) {
                                passed++;
                            }
                        }


                        //Validate for length of Password.
                        if (passed > 2 && $(this).val().length > 8) {
                            passed++;
                        }

                        //Display status.
                        var color = "";
                        var strength = "";
                        switch (passed) {
                            case 0:
                            case 1:
                                strength = "Weak";
                                color = "red";
                                break;
                            case 2:
                                strength = "Good";
                                color = "darkorange";
                                break;
                            case 3:
                            case 4:
                                strength = "Strong";
                                color = "green";
                                break;
                            case 5:
                                strength = "Very Strong";
                                color = "darkgreen";
                                break;
                        }
                        $("#password_strength").html(strength);
                        $("#password_strength").css("color", color);
                        Validate = $("#password_strength").html();
                        $("#hdfValidation").val(Validate);
                    });
                });
            });
        </script>
